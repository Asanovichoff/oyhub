services:
  oyhub:
    build: .
    stdin_open: true   # MCP speaks over stdio
    volumes:
      - oyhub-data:/data/hub
      # Point at your real Obsidian vault to see memory notes in Obsidian:
      # - ~/Documents/MyVault:/data/vault
      - oyhub-vault:/data/vault

  # --- observability profile: docker compose --profile observability up ---
  # The dashboard itself runs on the HOST (`oyhub dashboard`) so it reads the
  # live SQLite state directly — WAL over Docker bind mounts is unreliable.
  # Prometheus scrapes it via host.docker.internal.

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # needed on Linux; harmless on macOS
    profiles: [observability]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    profiles: [observability]

volumes:
  oyhub-data:
  oyhub-vault:
  prometheus-data:
  grafana-data:
